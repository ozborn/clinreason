# PURL configuration for http://purl.obolibrary.org/obo/clco

idspace: CLCO
base_url: /obo/clco

products:
- clco.owl: https://raw.githubusercontent.com/ozborn/clinreason/main/clco.owl
- clco.obo: https://raw.githubusercontent.com/ozborn/clinreason/main/clco.obo

term_browser: ontobee
example_terms:
- CLCO_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/ozborn/clinreason/v

- prefix: /tracker/
  replacement: https://github.com/ozborn/clinreason/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/CLCO?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/ozborn/clinreason/main/
